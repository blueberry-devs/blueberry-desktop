name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump (skip if already bumped)
        type: choice
        options:
          - patch
          - minor
          - major
          - skip
        default: patch
      release_notes:
        description: Short summary (optional — full notes from RELEASE_NOTES.md)
        type: string
        required: false

env:
  SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
  YANDEX_PROXY_URL: ${{ secrets.YANDEX_PROXY_URL }}

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version and push
        id: bump
        run: |
          if [ "${{ inputs.version_bump }}" = "skip" ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Skipping version bump, current: $VERSION"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm version ${{ inputs.version_bump }} -m "v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git push
          git push --tags

  build:
    needs: bump-version
    strategy:
      matrix:
        include:
          - os: windows-latest
            dist-flag: --win
            artifact: blueberry-win
            server-script: scripts\build-server.bat

          - os: macos-latest
            dist-flag: --mac
            artifact: blueberry-mac
            server-script: bash scripts/build-server.sh

          - os: ubuntu-latest
            dist-flag: --linux
            artifact: blueberry-linux
            server-script: bash scripts/build-server.sh

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: actions-rust-toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build server sidecar
        shell: bash
        run: ${{ matrix.server-script }}

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          # Decode and set signing vars per-platform
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "$WIN_CERT_BASE64" ]; then
            echo "$WIN_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.pfx"
            export CSC_LINK="$RUNNER_TEMP/cert.pfx"
            export CSC_KEY_PASSWORD="$WIN_CERT_PASSWORD"
            echo "[signing] Windows certificate configured"
          fi
          # macOS signing uses APPLE_ID/APPLE_ID_PASSWORD/APPLE_TEAM_ID directly
          pnpm run build
          npx electron-builder ${{ matrix.dist-flag }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: warn

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect artifacts
        run: |
          mkdir release
          find release-artifacts -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.zip' -o -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name 'latest*.yml' -o -name '*.blockmap' \) -exec cp {} release/ \;
          ls -la release/

      - name: Build release body
        id: body
        run: |
          NOTES_FILE="RELEASE_NOTES.md"
          SUMMARY="${{ inputs.release_notes }}"
          BODY_FILE="${{ runner.temp }}/release_body.md"

          if [ -n "$SUMMARY" ]; then
            echo "$SUMMARY" > "$BODY_FILE"
            echo "" >> "$BODY_FILE"
            echo "" >> "$BODY_FILE"
          else
            > "$BODY_FILE"
          fi

          if [ -f "$NOTES_FILE" ]; then
            cat "$NOTES_FILE" >> "$BODY_FILE"
          fi

          echo "path=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.body.outputs.path }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
