name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
  YANDEX_PROXY_URL: ${{ secrets.YANDEX_PROXY_URL }}
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            dist-flag: --win
            artifact: blueberry-win
            server-script: scripts\build-server.bat

          - os: macos-latest
            dist-flag: --mac
            artifact: blueberry-mac
            server-script: bash scripts/build-server.sh

          - os: ubuntu-latest
            dist-flag: --linux
            artifact: blueberry-linux
            server-script: bash scripts/build-server.sh

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Generate token for private submodules
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: blueberry-devs
          repositories: blueberry-desktop,blueberry-music-lib

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build server sidecar
        run: ${{ matrix.server-script }}

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run build
          npx electron-builder ${{ matrix.dist-flag }} --publish onTagOrDraft

      - name: Delete old artifact (keep only latest)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts" \
            --jq '.artifacts[] | select(.name == "${{ matrix.artifact }}") | .id' \
            | xargs -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/{}" \
            || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: warn
