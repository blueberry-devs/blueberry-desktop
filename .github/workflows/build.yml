name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
  YANDEX_PROXY_URL: ${{ secrets.YANDEX_PROXY_URL }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            dist-flag: --win
            artifact: blueberry-win
            server-script: scripts\build-server.bat

          - os: macos-latest
            dist-flag: --mac
            artifact: blueberry-mac
            server-script: bash scripts/build-server.sh

          - os: ubuntu-latest
            dist-flag: --linux
            artifact: blueberry-linux
            server-script: bash scripts/build-server.sh

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Setup SSH for private submodules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUBMODULE_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: actions/checkout@v4

      - name: Init private submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build server sidecar
        run: ${{ matrix.server-script }}

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run build
          npx electron-builder ${{ matrix.dist-flag }} --publish onTagOrDraft

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: warn
