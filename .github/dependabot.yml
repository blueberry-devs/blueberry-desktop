version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Moscow
    versioning-strategy: increase
    groups:
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      vite:
        patterns:
          - 'vite*'
          - 'electron-vite'
          - '@vitejs/*'
